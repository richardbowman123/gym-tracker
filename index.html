<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1117">
  <title>Gym Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>GYM TRACKER</h1>
  </header>

  <main>
    <!-- ===== HOME TAB ===== -->
    <section id="tab-home" class="tab-content active">
      <div id="home-status"></div>
      <div id="home-grid" class="home-grid"></div>
      <div id="home-goals"></div>
    </section>

    <!-- ===== LOG TAB ===== -->
    <section id="tab-log" class="tab-content">
      <div class="log-section">
        <label class="field-label">Date</label>
        <input type="date" id="log-date" class="input-field">
      </div>

      <div class="log-section">
        <label class="field-label">Exercise</label>
        <div class="recent-exercises" id="recent-exercises"></div>
        <select id="exercise-select" class="input-field">
          <option value="">Choose exercise...</option>
        </select>
      </div>

      <div id="entry-panel" class="entry-panel hidden">
        <div class="log-section">
          <label class="field-label">Weight (kg)</label>
          <div class="stepper">
            <button class="step-btn" onclick="adjustWeight(-5)">-5</button>
            <button class="step-btn step-sm" onclick="adjustWeight(-2.5)">-2.5</button>
            <input type="number" id="weight-input" class="stepper-value" value="0" step="0.5" min="0">
            <button class="step-btn step-sm" onclick="adjustWeight(2.5)">+2.5</button>
            <button class="step-btn" onclick="adjustWeight(5)">+5</button>
          </div>
          <div class="weight-hint" id="weight-hint"></div>
        </div>

        <div class="log-section">
          <label class="field-label">Reps</label>
          <div class="stepper">
            <button class="step-btn" onclick="adjustReps(-1)">-1</button>
            <input type="number" id="reps-input" class="stepper-value" value="0" step="0.5" min="0">
            <button class="step-btn" onclick="adjustReps(1)">+1</button>
          </div>
        </div>

        <div class="log-section">
          <label class="field-label">Assisted reps <span class="hint">(0 if none)</span></label>
          <div class="stepper stepper-narrow">
            <button class="step-btn" onclick="adjustAssisted(-1)">-1</button>
            <input type="number" id="assisted-input" class="stepper-value" value="0" step="1" min="0">
            <button class="step-btn" onclick="adjustAssisted(1)">+1</button>
          </div>
        </div>

        <div class="log-section">
          <button class="toggle-notes-btn" onclick="toggleNotes()">+ Add notes</button>
          <input type="text" id="notes-input" class="input-field hidden" placeholder="Optional notes...">
        </div>

        <button class="log-set-btn" onclick="handleLogSet()">LOG SET</button>
      </div>

      <div class="log-section">
        <h3 class="section-title" id="today-title">Today's Sets</h3>
        <div id="today-sets"></div>
      </div>
    </section>

    <!-- ===== HISTORY TAB ===== -->
    <section id="tab-history" class="tab-content">
      <div class="filter-bar" id="history-filters"></div>
      <div id="history-list"></div>
    </section>

    <!-- ===== CHARTS TAB ===== -->
    <section id="tab-charts" class="tab-content">
      <div class="chart-controls">
        <select id="chart-exercise" class="input-field" onchange="updateChart()">
          <option value="">Choose exercise...</option>
        </select>
      </div>
      <div class="chart-container">
        <canvas id="progress-chart"></canvas>
      </div>
      <div id="chart-stats" class="chart-stats"></div>
    </section>

    <!-- ===== GOALS TAB ===== -->
    <section id="tab-goals" class="tab-content">
      <h2 class="section-title">2026 Goals</h2>
      <div id="goals-list"></div>
      <h2 class="section-title" style="margin-top:24px">Personal Bests</h2>
      <div id="pb-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="home" onclick="showTab('home')">
      <span class="nav-icon">&#8962;</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-tab="log" onclick="showTab('log')">
      <span class="nav-icon">+</span>
      <span class="nav-label">Log</span>
    </button>
    <button class="nav-btn" data-tab="history" onclick="showTab('history')">
      <span class="nav-icon">&#9776;</span>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-btn" data-tab="charts" onclick="showTab('charts')">
      <span class="nav-icon">&#9650;</span>
      <span class="nav-label">Charts</span>
    </button>
    <button class="nav-btn" data-tab="goals" onclick="showTab('goals')">
      <span class="nav-icon">&#9733;</span>
      <span class="nav-label">Goals</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
